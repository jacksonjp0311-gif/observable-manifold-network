  <text x="52" y="585" fill="#94a3b8" font-family="Segoe UI, Arial" font-size="12">Boundary: metrics show local replayability, repository orientation, and continuity discipline. They do not prove correctness, empirical validation, causality, mechanism, AI understanding, production readiness, or GMN replication.</text>
