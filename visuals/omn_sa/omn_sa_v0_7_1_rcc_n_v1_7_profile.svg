    <text x="0" y="160" fill="#cbd5e1" font-size="14">Governance cost accounting</text>
    <rect x="230" y="142" width="520" height="24" rx="8" fill="#1e293b"/>
    <rect x="230" y="142" width="390" height="24" rx="8" fill="#a78bfa"/>
    <text x="770" y="160" fill="#f8fafc" font-size="14">placeholder</text>

    <text x="0" y="206" fill="#cbd5e1" font-size="14">Corrective governance</text>
    <rect x="230" y="188" width="520" height="24" rx="8" fill="#1e293b"/>
    <rect x="230" y="188" width="520" height="24" rx="8" fill="#22c55e"/>
    <text x="770" y="206" fill="#f8fafc" font-size="14">enabled</text>
  </g>

  <text x="52" y="585" fill="#94a3b8" font-family="Segoe UI, Arial" font-size="12">Boundary: profile adoption is not validation; utility claims require baseline and cost; RCC-N v1.7 is GEN-R boundary, not full GEN v1.0.</text>
</svg>