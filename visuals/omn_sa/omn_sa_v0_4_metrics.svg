    <text x="642" y="96" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="13">navigation integrity, not code correctness</text>
  </g>

  <g transform="translate(70,310)" font-family="Segoe UI, Arial, sans-serif">
