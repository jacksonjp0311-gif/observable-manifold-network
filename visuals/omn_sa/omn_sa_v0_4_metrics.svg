  <rect x="48" y="500" width="884" height="1" fill="#334155"/>
  <text x="48" y="528" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="13">Boundary: metrics show local validation and repository orientation discipline. They do not prove causality, mechanism, empirical validation, AI understanding, production readiness, or GMN replication.</text>
