    <text x="0" y="122" fill="#cbd5e1" font-size="13">v0.4</text>
    <rect x="80" y="104" width="260" height="24" rx="8" fill="#1e293b"/>
    <rect x="80" y="104" width="260" height="24" rx="8" fill="#fbbf24"/>
    <text x="355" y="122" fill="#cbd5e1" font-size="13">graph engine extraction</text>

    <line x1="580" y1="10" x2="850" y2="10" stroke="#475569" stroke-width="2"/>
    <circle cx="610" cy="10" r="10" fill="#60a5fa"/>
    <circle cx="720" cy="10" r="10" fill="#34d399"/>
    <circle cx="830" cy="10" r="10" fill="#fbbf24"/>
