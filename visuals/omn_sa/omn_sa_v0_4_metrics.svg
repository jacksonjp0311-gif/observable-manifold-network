    <text x="690" y="45" fill="#cbd5e1" font-size="13">v0.3 wrapper</text>
    <text x="795" y="45" fill="#cbd5e1" font-size="13">v0.4 graph</text>

    <text x="580" y="96" fill="#f8fafc" font-size="16" font-weight="700">v0.4 Law</text>
    <text x="580" y="124" fill="#cbd5e1" font-size="14">No split without parity.</text>
    <text x="580" y="146" fill="#cbd5e1" font-size="14">No parity without evidence.</text>
    <text x="580" y="168" fill="#cbd5e1" font-size="14">No evidence without validation.</text>
