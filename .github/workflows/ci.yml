name: OMN RCC-N CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  smoke:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Smoke-check README release state
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $Readme = Get-Content -Raw -Path "README.md"

          if ($Readme -match "pending-v0\.8|pending-v0\.8\.0") {
            throw "README still contains pending v0.8 fields."
          }

          $Required = @(
            "Current software layer | OMN-SA v0.9.3",
            "Latest public alignment patch | OMN-SA v0.9.3 README / registry autopatcher",
            "Current tests | 65 OK",
            "Release reference | v0.9.3 README / registry autopatcher",
            "AI README Update Policy",
            "OMN-SA v0.8 Metric Availability and Residual Field Hardening",
            "OMN-SA v0.8.1 Validation Compatibility Repair",
            "OMN-SA v0.8.2 README Lineage and AI Update Policy",
            "OMN-SA v0.8.3 CI / Release Boundary Separation",
            "OMN-SA v0.9.0 Deterministic Run Identity and Execution Modes",
            "OMN-SA v0.9.1 Stable Evidence Index and Latest Pointer System",
            "OMN-SA v0.9.2 Public Metrics Dashboard",
            "OMN-SA v0.9.3 README / Registry Autopatcher",
            "Observable topology is not truth",
            "Prediction is not mechanism",
            "Simulation is not proof"
          )

          foreach ($Marker in $Required) {
            if (-not $Readme.Contains($Marker)) {
              throw "Missing README marker: $Marker"
            }
          }

          Write-Host "README smoke check passed."

      - name: Run unit tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:PYTHONPATH = "$PWD\src"
          python -m unittest discover -s tests

      - name: Run CLI smoke check
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:PYTHONPATH = "$PWD\src"
          python -m omn --help

      - name: Boundary note
        shell: pwsh
        run: |
          Write-Host "CI is a non-release smoke gate."
          Write-Host "Full artifact-emitting validation is performed locally during release checkpoints."
          Write-Host "CI does not refresh evidence packages, ledgers, dashboards, or latest reports."