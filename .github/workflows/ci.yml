name: OMN RCC-N CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show repository state
        shell: pwsh
        run: |
          git status --short
          Get-ChildItem

      - name: Run RCC-N checker
        shell: pwsh
        run: |
          $env:PYTHONPATH = "$PWD\src"
          python scripts/rcc/check_rcc_nexus.py

      - name: Run architecture contract validation
        shell: pwsh
        run: |
          $env:PYTHONPATH = "$PWD\src"
          python scripts/validation/validate_architecture_contracts.py

      - name: Run unit tests
        shell: pwsh
        run: |
          $env:PYTHONPATH = "$PWD\src"
          python -m unittest discover -s tests

      - name: Run OMN synthetic seed
        shell: pwsh
        run: |
          $env:PYTHONPATH = "$PWD\src"
          python -m omn run --seed synthetic-toy
          python -m omn validate